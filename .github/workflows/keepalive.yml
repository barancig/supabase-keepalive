name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 9 * * 1,4'  # Every Monday and Thursday at 9am UTC
  workflow_dispatch:        # Allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Master Project (Signal Sovereign)
        run: |
          curl -s "${{ secrets.SUPABASE_URL_1 }}/rest/v1/signal_sovereign_scores?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_KEY_1 }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY_1 }}"

      - name: Ping Voiding Diary
        run: |
          curl -s "${{ secrets.SUPABASE_URL_2 }}/rest/v1/entries?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_KEY_2 }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY_2 }}"
